<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beautiful Login Page</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-700 via-blue-600 to-sky-500 flex items-center justify-center p-4">

  <!-- Background Glow -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-10 left-10 w-72 h-72 bg-blue-400 opacity-30 rounded-full blur-3xl"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-cyan-300 opacity-20 rounded-full blur-3xl"></div>
  </div>

  <!-- Login Card -->
  <div class="relative w-full max-w-md">
    <div class="backdrop-blur-xl bg-white/10 border border-white/20 shadow-2xl rounded-3xl p-8 sm:p-10 text-white">

      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg"
            class="w-8 h-8 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 11c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3zm6 8v-1a4 4 0 00-4-4H8a4 4 0 00-4 4v1" />
          </svg>
        </div>
      </div>

      <!-- Heading -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold">Welcome Back</h1>
        <p class="text-blue-100 mt-2 text-sm">
          Sign in to continue to your account
        </p>
      </div>

      <!-- Form -->
      <form class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-2">Email</label>
          <input
            type="email"
            placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-xl bg-white/15 border border-white/20 placeholder-blue-100 text-white focus:outline-none focus:ring-2 focus:ring-white/70 focus:border-transparent transition"
          />
        </div>

        <!-- Password -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-medium">Password</label>
            <a href="#" class="text-sm text-blue-100 hover:text-white transition">
              Forgot?
            </a>
          </div>

          <input
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl bg-white/15 border border-white/20 placeholder-blue-100 text-white focus:outline-none focus:ring-2 focus:ring-white/70 focus:border-transparent transition"
          />
        </div>

        <!-- Remember -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="rounded border-white/30 text-blue-600 focus:ring-blue-500">
            <span class="text-blue-100">Remember me</span>
          </label>
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-white text-blue-700 font-semibold py-3 rounded-xl hover:bg-blue-50 active:scale-[0.98] transition-all duration-200 shadow-lg"
        >
          Sign In
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 h-px bg-white/20"></div>
        <span class="px-4 text-sm text-blue-100">or continue with</span>
        <div class="flex-1 h-px bg-white/20"></div>
      </div>

      <!-- Social Buttons -->
      <div class="grid grid-cols-2 gap-4">
        <button class="flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 py-3 rounded-xl transition">
          <span>Google</span>
        </button>

        <button class="flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 py-3 rounded-xl transition">
          <span>GitHub</span>
        </button>
      </div>

      <!-- Footer -->
      <p class="text-center text-sm text-blue-100 mt-8">
        Don’t have an account?
        <a href="#" class="font-semibold text-white hover:underline">
          Sign up
        </a>
      </p>

    </div>
  </div>

</body>
</html>
